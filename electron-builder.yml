appId: com.cli-launcher.app
productName: CLI Launcher
directories:
  output: release
  buildResources: resources
publish:
  - provider: github
    owner: MadBlast0
    repo: Cli-launcher
    releaseType: release
asarUnpack:
  - "src/cli-registry/**"

files:
  - dist/**/*
  - src/cli-registry/**/*.ps1
  - src/cli-registry/**/*.sh
  - resources/**/*

# Copy the runtime icons to the app's resources root so main.ts can load them
# via process.resourcesPath in packaged builds (they'd otherwise be trapped
# inside app.asar and fail to load for the tray/window icon).
extraResources:
  - from: resources
    to: .
    filter:
      - icon.ico
      - icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
    - target: msi
      arch:
        - x64
    - target: zip
      arch:
        - x64
  icon: resources/icon.ico
  publisherName: CLI Launcher
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CLI Launcher
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerSidebar: null
  uninstallDisplayName: CLI Launcher
  language: 1033

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
        - universal
    - target: zip
      arch:
        - x64
        - arm64
        - universal
    - target: 7z
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  category: public.app-category.developer-tools
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
    - target: tar.gz
      arch:
        - x64
        - arm64
  icon: resources/icon.png
  category: Development
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"
