name: Build

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Build renderer
        run: npm run build:renderer
      - name: Build main process
        run: npm run build:main
      - name: Delete existing release (clean slate)
        if: runner.os == 'Linux'
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" &>/dev/null; then
            gh release delete "${{ github.ref_name }}" --yes --cleanup-tag
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & publish
        run: >
          npx electron-builder
          ${{ runner.os == 'macOS' && '--universal --mac' || '' }}
          --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}